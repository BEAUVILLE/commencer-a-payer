<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DIGIY PAY — Accès Caisse 🔒</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#020617">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.DIGIY_MODULE = "POS";
  </script>
  <script src="./guard.js?v=caisse-pin-v2"></script>

  <style>
    :root{
      --bg:#020617;
      --card:#030712;
      --line:rgba(250,204,21,.22);
      --text:#ffffff;
      --muted:#94a3b8;
      --gold1:#facc15;
      --gold2:#f59e0b;
      --ok:#22c55e;
      --bad:#ef4444;
      --shadow:0 20px 60px rgba(0,0,0,.45);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(250,204,21,.08), transparent 60%),
        radial-gradient(900px 500px at 80% 90%, rgba(34,197,94,.06), transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      padding:18px;
    }

    .box{
      width:min(100%, 380px);
      background:rgba(3,7,18,.96);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:24px;
      text-align:center;
      box-shadow:var(--shadow);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(250,204,21,.24);
      background:rgba(250,204,21,.08);
      color:#fde68a;
      font-size:12px;
      font-weight:800;
      margin-bottom:14px;
    }

    h2{
      margin:0;
      font-size:24px;
      line-height:1.15;
    }

    .sub{
      margin:10px 0 0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .field{
      margin-top:18px;
      text-align:left;
    }

    .label{
      display:block;
      margin-bottom:8px;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:#0f172a;
      color:#fff;
      font-size:18px;
      text-align:center;
      outline:none;
    }

    input:focus{
      border-color:rgba(250,204,21,.45);
      box-shadow:0 0 0 3px rgba(250,204,21,.10);
    }

    button{
      margin-top:14px;
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      color:#111827;
      background:linear-gradient(135deg,var(--gold1),var(--gold2));
    }

    button:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .ghost{
      margin-top:10px;
      background:transparent;
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
    }

    .msg{
      margin-top:12px;
      font-size:13px;
      color:var(--muted);
      min-height:20px;
      line-height:1.45;
      white-space:pre-wrap;
    }

    .msg.ok{ color:var(--ok); }
    .msg.bad{ color:var(--bad); }

    .mini{
      margin-top:14px;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="badge">🔐 DIGIY PAY · CAISSE</div>
    <h2>Accès Caisse Centrale</h2>
    <p class="sub">
      Entrée sécurisée pour ouvrir le cockpit caisse.
    </p>

    <div class="field">
      <label class="label" for="pin">PIN ADMIN</label>
      <input id="pin" placeholder="PIN ADMIN" type="password" inputmode="numeric" autocomplete="one-time-code">
    </div>

    <button id="go" type="button">Ouvrir la caisse</button>
    <button id="back" class="ghost" type="button">Retour</button>

    <div class="msg" id="msg"></div>

    <div class="mini">
      Session locale caisse : 8 heures
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      const ADMIN_PIN = "225588";
      const CAISSE_KEY = "DIGIY_CAISSE_ADMIN_SESSION";
      const TTL_MS = 8 * 60 * 60 * 1000;
      const DASHBOARD_URL = "dashboard-caisse.html";

      const $ = (id) => document.getElementById(id);
      const pinEl = $("pin");
      const goEl = $("go");
      const backEl = $("back");
      const msgEl = $("msg");

      function setMsg(text, tone){
        msgEl.textContent = text || "";
        msgEl.className = "msg" + (tone ? " " + tone : "");
      }

      function loadSession(){
        try{
          const raw = localStorage.getItem(CAISSE_KEY);
          if(!raw) return null;

          const s = JSON.parse(raw);
          if(!s || !s.ts) {
            localStorage.removeItem(CAISSE_KEY);
            return null;
          }

          if(Date.now() - Number(s.ts) > TTL_MS){
            localStorage.removeItem(CAISSE_KEY);
            return null;
          }

          return s;
        }catch(e){
          localStorage.removeItem(CAISSE_KEY);
          return null;
        }
      }

      function saveSession(){
        const payload = {
          role: "caisse_admin",
          module: "PAY",
          ts: Date.now()
        };
        localStorage.setItem(CAISSE_KEY, JSON.stringify(payload));
        return payload;
      }

      function goDashboard(){
        window.location.href = DASHBOARD_URL;
      }

      function login(){
        const value = String(pinEl.value || "").trim();

        if(!value){
          setMsg("Entre le PIN admin.", "bad");
          return;
        }

        if(value !== ADMIN_PIN){
          setMsg("❌ PIN incorrect", "bad");
          return;
        }

        saveSession();
        setMsg("✅ Accès validé…", "ok");

        setTimeout(goDashboard, 250);
      }

      goEl.addEventListener("click", login);

      pinEl.addEventListener("keydown", (e) => {
        if(e.key === "Enter"){
          login();
        }
      });

      backEl.addEventListener("click", () => {
        if(document.referrer){
          history.back();
        } else {
          window.location.href = "./index.html";
        }
      });

      const existing = loadSession();
      if(existing){
        setMsg("✅ Session caisse déjà active…", "ok");
        setTimeout(goDashboard, 180);
      } else {
        pinEl.focus();
      }
    })();
  </script>

</body>
</html>

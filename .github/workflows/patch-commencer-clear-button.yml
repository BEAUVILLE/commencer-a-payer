name: Patch commencer-a-payer clear button

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/patch-commencer-clear-button.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          html=p.read_text(encoding='utf-8')
          before=html
          html=html.replace('tarifs-mobile-direct-sans-moulinage-2026-05-29','tarifs-mobile-clear-selection-2026-05-29')
          if 'id="btnClearSelection"' not in html:
              html=html.replace('<a class="digiy-benefit-activate" id="digiyBenefitActivate" href="#manualBox">🚀 Activer mon module</a>', '<a class="digiy-benefit-activate" id="digiyBenefitActivate" href="#manualBox">🚀 Activer mon module</a><button class="digiy-benefit-activate" id="btnClearSelection" type="button">🧹 Effacer</button>')
          inject='''function clearTarifSelection(){selectedBase=null;selectedBoost=null;orderReference="";try{const u=new URL(location.href);["module","plan","code","boost","boost_code","ref"].forEach(k=>u.searchParams.delete(k));history.replaceState(null,"",u.toString())}catch(_){}renderGrids();renderOrder();setStatus("🧹 Choix effacés. Choisis ton code.","warn","À CHOISIR");scrollBenefitPanelOnPhone()}'''
          if 'function clearTarifSelection()' not in html:
              html=html.replace('function setupSubscriptionBenefitPanel(){', inject+'function setupSubscriptionBenefitPanel(){')
          if 'btnClearSelection' in html and '$("btnClearSelection")' not in html:
              html=html.replace('if(a)a.addEventListener("click",e=>{const target=$("manualBox");if(target){e.preventDefault();target.scrollIntoView({behavior:"smooth",block:"start"})}})}', 'if(a)a.addEventListener("click",e=>{const target=$("manualBox");if(target){e.preventDefault();target.scrollIntoView({behavior:"smooth",block:"start"})}});const c=$("btnClearSelection");if(c)c.addEventListener("click",clearTarifSelection)}')
          if html!=before:
              p.write_text(html,encoding='utf-8')
              print('commencer-a-payer patched')
          else: print('No change')
          PY
      - run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add clear selection button to commencer-a-payer"
          git push
